name: iOS Build & Upload

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'CODEMAGIC_PHONE_SETUP.md'
      - 'FINAL_STEPS.md'
      - 'codemagic.yaml'
      - '**/*.md'

jobs:
  build:
    name: Build IPA and upload to App Store Connect
    runs-on: macos-14
    timeout-minutes: 60

    env:
      BUNDLE_ID: com.brycebeck.crocclash
      APPLE_TEAM_ID: USZ4L8LG24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: false

      - name: Install npm deps
        run: npm install

      - name: Capacitor sync
        run: |
          npx cap sync ios
          chmod +x scripts/install-ios-assets.sh
          ./scripts/install-ios-assets.sh

      - name: Install fastlane
        working-directory: ios/App
        run: |
          gem install bundler --no-document
          bundle install

      - name: Install CocoaPods
        working-directory: ios/App
        run: |
          pod install --repo-update

      - name: Setup keychain
        run: |
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="tempkeychainpw"
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -t 7200 "$KEYCHAIN_NAME"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Run fastlane release
        working-directory: ios/App
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          FASTLANE_DISABLE_COLORS: '1'
          FASTLANE_HIDE_CHANGELOG: '1'
          FASTLANE_SKIP_UPDATE_CHECK: '1'
        run: |
          bundle exec fastlane release

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/App/fastlane/report.xml
            ios/App/*.ipa
            ~/Library/Logs/gym/
          retention-days: 7
          if-no-files-found: ignore
