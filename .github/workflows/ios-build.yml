name: iOS Build & Upload

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'CODEMAGIC_PHONE_SETUP.md'
      - 'FINAL_STEPS.md'
      - 'codemagic.yaml'
      - '**/*.md'

jobs:
  build:
    name: Build IPA and upload to App Store Connect
    runs-on: macos-26
    timeout-minutes: 60

    env:
      BUNDLE_ID: com.brycebeck.crocclash
      APPLE_TEAM_ID: USZ4L8LG24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: false

      - name: Install npm deps
        run: npm install

      - name: Capacitor sync
        run: |
          npx cap sync ios
          chmod +x scripts/install-ios-assets.sh
          ./scripts/install-ios-assets.sh

      - name: Install fastlane
        working-directory: ios/App
        run: |
          gem install bundler --no-document
          bundle install

      - name: Install CocoaPods
        working-directory: ios/App
        run: |
          pod install --repo-update

      - name: Cleanup old Distribution certs to avoid Apple's 3-cert limit
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          pip3 install pyjwt cryptography requests --break-system-packages 2>/dev/null || pip3 install pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, requests
          import jwt
          key_b64 = os.environ['APP_STORE_CONNECT_PRIVATE_KEY']
          key = base64.b64decode(key_b64).decode()
          token = jwt.encode(
              {'iss': os.environ['APP_STORE_CONNECT_ISSUER_ID'], 'iat': int(time.time()), 'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256',
              headers={'kid': os.environ['APP_STORE_CONNECT_KEY_ID'], 'typ':'JWT'},
          )
          h = {'Authorization': f'Bearer {token}'}
          r = requests.get('https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DISTRIBUTION,IOS_DISTRIBUTION&limit=20', headers=h)
          certs = r.json().get('data', [])
          print(f'Found {len(certs)} distribution certs')
          # Delete ALL distribution certs so fastlane can always create fresh
          # (we don't have the private key for any existing cert on the runner)
          for c in certs:
              rd = requests.delete(f"https://api.appstoreconnect.apple.com/v1/certificates/{c['id']}", headers=h)
              print(f"  Deleted {c['id']}: HTTP {rd.status_code}")
          print('Cleanup done')
          PY

      - name: Cleanup old provisioning profiles for this bundle
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 - <<'PY'
          import os, base64, time, requests
          import jwt
          key_b64 = os.environ['APP_STORE_CONNECT_PRIVATE_KEY']
          key = base64.b64decode(key_b64).decode()
          token = jwt.encode(
              {'iss': os.environ['APP_STORE_CONNECT_ISSUER_ID'], 'iat': int(time.time()), 'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256',
              headers={'kid': os.environ['APP_STORE_CONNECT_KEY_ID'], 'typ':'JWT'},
          )
          h = {'Authorization': f'Bearer {token}'}
          BUNDLE = 'com.brycebeck.crocclash'
          r = requests.get('https://api.appstoreconnect.apple.com/v1/profiles?limit=200&fields[profiles]=name,profileType,profileState', headers=h)
          profiles = r.json().get('data', [])
          to_delete = [p for p in profiles if BUNDLE in p['attributes'].get('name','')]
          print(f'Found {len(profiles)} total profiles, {len(to_delete)} match bundle {BUNDLE}')
          for p in to_delete:
              rd = requests.delete(f"https://api.appstoreconnect.apple.com/v1/profiles/{p['id']}", headers=h)
              print(f"  Deleted {p['id']} ({p['attributes'].get('name')}): HTTP {rd.status_code}")
          print('Profile cleanup done')
          PY

      - name: Setup keychain
        run: |
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="tempkeychainpw"
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -t 7200 "$KEYCHAIN_NAME"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Run fastlane release
        working-directory: ios/App
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          FASTLANE_DISABLE_COLORS: '1'
          FASTLANE_HIDE_CHANGELOG: '1'
          FASTLANE_SKIP_UPDATE_CHECK: '1'
        run: |
          bundle exec fastlane release

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/App/fastlane/report.xml
            ios/App/*.ipa
            ~/Library/Logs/gym/
          retention-days: 7
          if-no-files-found: ignore
